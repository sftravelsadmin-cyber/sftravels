<div class="fixed inset-0 z-[100] flex items-end md:items-center justify-center md:p-4 bg-black/60 backdrop-blur-sm overflow-hidden"
    style="
    /* display: none; */
">
    <div class="bg-white w-full h-full md:h-auto md:max-h-[90vh] md:max-w-2xl rounded-none md:rounded-xl shadow-2xl relative flex flex-col"
        style="opacity: 1; transform: translateY(0%) scale(1) translateZ(0px);">
        <div
            class="flex-none bg-white border-b border-gray-100 px-4 py-3 md:px-5 md:py-4 flex items-center justify-between rounded-none md:rounded-t-xl sticky top-0 z-10 shrink-0">
            <div>
                <h2 class="text-base md:text-xl font-bold text-gray-900">Book Your Ride</h2>
                <p class="text-[10px] md:text-xs text-gray-500 mt-0.5">Fill in the details below</p>
            </div><button
                class="p-1.5 md:p-2 -mr-2 hover:bg-gray-100 rounded-full transition-colors disabled:opacity-50"
                aria-label="Close modal"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="w-5 h-5 text-gray-500">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                </svg></button>
        </div>
        <div class="flex-1 md:overflow-y-auto p-3 md:p-5 scrollbar-hide">
            <div
                class="mb-3 md:mb-6 p-2 md:p-4 bg-green-50 rounded-lg border border-green-100 flex items-center gap-3 md:gap-4">
                <div class="bg-white p-1.5 md:p-2.5 rounded-full shadow-sm shrink-0"><svg
                        xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="w-4 h-4 md:w-5 md:h-5 text-[#1ecb15]">
                        <path
                            d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2">
                        </path>
                        <circle cx="7" cy="17" r="2"></circle>
                        <path d="M9 17h6"></path>
                        <circle cx="17" cy="17" r="2"></circle>
                    </svg></div>
                <div class="min-w-0">
                    <p class="font-bold text-gray-900 text-xs md:text-base truncate">Hatchback</p>
                    <p class="text-[10px] md:text-sm text-gray-600 mt-0.5 truncate">One Way Taxi</p>
                </div>
            </div>
            <form id="booking-form" class="space-y-2 md:space-y-5">
                <div class="grid grid-cols-2 gap-2 md:gap-5">
                    <div class="space-y-1 md:space-y-2"><label
                            class="block text-[10px] md:text-xs font-bold text-gray-700 uppercase tracking-wide ml-0.5">Full
                            Name <span class="text-red-500">*</span></label>
                        <div class="relative w-full"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round"
                                class="absolute left-2 md:left-3 top-1/2 -translate-y-1/2 w-3 h-3 md:w-4 md:h-4 text-gray-400 pointer-events-none">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg><input type="text" name="fullName"
                                class="w-full pl-7 md:pl-10 pr-2 md:pr-3 py-1.5 md:py-2.5 bg-white border rounded-lg focus:ring-1 focus:ring-[#1ecb15] focus:border-transparent outline-none transition-all text-xs md:text-sm text-gray-900 h-8 md:h-auto disabled:opacity-50 disabled:bg-gray-100 border-gray-300"
                                placeholder="John Doe" value=""></div>
                    </div>
                    <div class="space-y-1 md:space-y-2"><label
                            class="block text-[10px] md:text-xs font-bold text-gray-700 uppercase tracking-wide ml-0.5">Phone
                            <span class="text-red-500">*</span></label>
                        <div class="relative w-full"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round"
                                class="absolute left-2 md:left-3 top-1/2 -translate-y-1/2 w-3 h-3 md:w-4 md:h-4 text-gray-400 pointer-events-none">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                                </path>
                            </svg><input type="tel" name="phone"
                                class="w-full pl-7 md:pl-10 pr-2 md:pr-3 py-1.5 md:py-2.5 bg-white border rounded-lg focus:ring-1 focus:ring-[#1ecb15] focus:border-transparent outline-none transition-all text-xs md:text-sm text-gray-900 h-8 md:h-auto disabled:opacity-50 disabled:bg-gray-100 border-gray-300"
                                placeholder="10-digit number" value=""></div>
                    </div>
                </div>
                <div class="space-y-1 md:space-y-2"><label
                        class="block text-[10px] md:text-xs font-bold text-gray-700 uppercase tracking-wide ml-0.5">Email
                        <span class="text-red-500">*</span></label>
                    <div class="relative w-full"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="absolute left-2 md:left-3 top-1/2 -translate-y-1/2 w-3 h-3 md:w-4 md:h-4 text-gray-400 pointer-events-none">
                            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                        </svg><input type="email" name="email"
                            class="w-full pl-7 md:pl-10 pr-2 md:pr-3 py-1.5 md:py-2.5 bg-white border rounded-lg focus:ring-1 focus:ring-[#1ecb15] focus:border-transparent outline-none transition-all text-xs md:text-sm text-gray-900 h-8 md:h-auto disabled:opacity-50 disabled:bg-gray-100 border-gray-300"
                            placeholder="john@example.com" value=""></div>
                </div>
                <div class="space-y-2 md:space-y-5">
                    <div class="space-y-1 md:space-y-2"><label
                            class="block text-[10px] md:text-xs font-bold text-gray-700 uppercase tracking-wide ml-0.5">Pickup
                            <span class="text-red-500">*</span></label>
                        <div class="relative flex items-center gap-2 w-full">
                            <div class="relative flex-grow w-full min-w-0">
                                <div class="relative w-full">
                                    <div class="relative"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round"
                                            class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 sm:w-4 sm:h-4 text-gray-400 pointer-events-none z-10">
                                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
                                            <circle cx="12" cy="10" r="3"></circle>
                                        </svg><input type="text" placeholder="Enter Pickup"
                                            class="w-full pl-8 sm:pl-9 sm:py-2 bg-gray-50 border border-gray-200 rounded-md focus:ring-1 focus:ring-[#1ecb15] focus:border-transparent outline-none transition-all text-gray-900 placeholder:text-gray-400 font-medium sm:text-sm sm:h-10 truncate py-1.5 md:py-2.5 h-8 md:h-10 pr-8 md:pr-10 text-xs md:text-sm disabled:opacity-50"
                                            value=""></div>
                                </div><button type="button"
                                    class="absolute right-1 top-1/2 -translate-y-1/2 p-1.5 md:p-2 hover:bg-gray-100 rounded-md text-[#1ecb15] transition-colors z-20 disabled:opacity-50"
                                    title="Use current location"><svg xmlns="http://www.w3.org/2000/svg" width="24"
                                        height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                        class="w-3 h-3 md:w-4 md:h-4">
                                        <line x1="2" x2="5" y1="12" y2="12"></line>
                                        <line x1="19" x2="22" y1="12" y2="12"></line>
                                        <line x1="12" x2="12" y1="2" y2="5"></line>
                                        <line x1="12" x2="12" y1="19" y2="22"></line>
                                        <circle cx="12" cy="12" r="7"></circle>
                                    </svg></button>
                            </div><button type="button"
                                class="flex-shrink-0 bg-gray-100 border border-gray-200 rounded-md hover:bg-[#1ecb15] hover:text-white transition-colors text-gray-600 h-8 w-8 md:h-10 md:w-10 flex items-center justify-center disabled:opacity-50"
                                title="Pick on Map"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
                                    <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                                    <line x1="9" x2="9" y1="3" y2="18"></line>
                                    <line x1="15" x2="15" y1="6" y2="21"></line>
                                </svg></button>
                        </div>
                    </div>
                    <div class="space-y-1 md:space-y-2"><label
                            class="block text-[10px] md:text-xs font-bold text-gray-700 uppercase tracking-wide ml-0.5">Drop
                            <span class="text-red-500">*</span></label>
                        <div class="relative flex items-center gap-2 w-full">
                            <div class="relative flex-grow w-full min-w-0">
                                <div class="relative w-full">
                                    <div class="relative"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round"
                                            class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 sm:w-4 sm:h-4 text-gray-400 pointer-events-none z-10">
                                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path>
                                            <circle cx="12" cy="10" r="3"></circle>
                                        </svg><input type="text" placeholder="Enter Drop"
                                            class="w-full pl-8 sm:pl-9 pr-8 sm:py-2 bg-gray-50 border border-gray-200 rounded-md focus:ring-1 focus:ring-[#1ecb15] focus:border-transparent outline-none transition-all text-gray-900 placeholder:text-gray-400 font-medium sm:text-sm sm:h-10 truncate py-1.5 md:py-2.5 h-8 md:h-10 text-xs md:text-sm disabled:opacity-50"
                                            value=""></div>
                                </div>
                            </div><button type="button"
                                class="flex-shrink-0 bg-gray-100 border border-gray-200 rounded-md hover:bg-[#1ecb15] hover:text-white transition-colors text-gray-600 h-8 w-8 md:h-10 md:w-10 flex items-center justify-center disabled:opacity-50"
                                title="Pick on Map"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 md:w-5 md:h-5">
                                    <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                                    <line x1="9" x2="9" y1="3" y2="18"></line>
                                    <line x1="15" x2="15" y1="6" y2="21"></line>
                                </svg></button>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 md:gap-4">
                    <div class="space-y-1 md:space-y-2"><label
                            class="block text-[10px] md:text-xs font-bold text-gray-700 uppercase tracking-wide ml-0.5">Date
                            <span class="text-red-500">*</span></label>
                        <div class="relative w-full"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round"
                                class="absolute left-2 md:left-3 top-1/2 -translate-y-1/2 w-3 h-3 md:w-4 md:h-4 text-gray-400 pointer-events-none">
                                <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                                <line x1="16" x2="16" y1="2" y2="6"></line>
                                <line x1="8" x2="8" y1="2" y2="6"></line>
                                <line x1="3" x2="21" y1="10" y2="10"></line>
                            </svg><input type="date" name="date" min="2026-06-04"
                                class="w-full pl-7 md:pl-10 pr-2 py-1.5 md:py-2.5 bg-white border rounded-lg focus:ring-1 focus:ring-[#1ecb15] focus:border-transparent outline-none transition-all text-xs md:text-sm text-gray-900 min-w-0 h-8 md:h-auto disabled:opacity-50 disabled:bg-gray-100 border-gray-300"
                                value=""></div>
                    </div>
                    <div class="space-y-1 md:space-y-2"><label
                            class="block text-[10px] md:text-xs font-bold text-gray-700 uppercase tracking-wide ml-0.5">Time
                            <span class="text-red-500">*</span></label>
                        <div class="flex gap-1.5 md:gap-2 w-full">
                            <div class="relative flex-1 min-w-0"><select name="hour"
                                    class="w-full px-1 py-1.5 md:py-2.5 bg-white border rounded-lg focus:ring-1 focus:ring-[#1ecb15] outline-none text-xs md:text-sm text-gray-900 appearance-none text-center h-8 md:h-auto disabled:opacity-50 disabled:bg-gray-100 border-gray-300">
                                    <option value="01">01</option>
                                    <option value="02">02</option>
                                    <option value="03">03</option>
                                    <option value="04">04</option>
                                    <option value="05">05</option>
                                    <option value="06">06</option>
                                    <option value="07">07</option>
                                    <option value="08">08</option>
                                    <option value="09">09</option>
                                    <option value="10">10</option>
                                    <option value="11">11</option>
                                    <option value="12">12</option>
                                </select></div><select name="minute"
                                class="flex-1 px-1 py-1.5 md:py-2.5 bg-white border rounded-lg focus:ring-1 focus:ring-[#1ecb15] outline-none text-xs md:text-sm text-gray-900 text-center min-w-0 h-8 md:h-auto disabled:opacity-50 disabled:bg-gray-100 border-gray-300">
                                <option value="00">00</option>
                                <option value="15">15</option>
                                <option value="30">30</option>
                                <option value="45">45</option>
                            </select><select name="period"
                                class="w-12 md:w-16 px-1 py-1.5 md:py-2.5 bg-white border rounded-lg focus:ring-1 focus:ring-[#1ecb15] outline-none text-xs md:text-sm text-gray-900 text-center h-8 md:h-auto disabled:opacity-50 disabled:bg-gray-100 border-gray-300">
                                <option value="AM">AM</option>
                                <option value="PM">PM</option>
                            </select>
                        </div>
                    </div>
                </div>
            </form>
        </div>
        <div
            class="flex-none p-3 md:p-5 border-t border-gray-100 bg-gray-50 rounded-b-none md:rounded-b-xl flex flex-col sm:flex-row gap-2 md:gap-3 shrink-0 pb-safe w-full">
            <button
                class="rounded-md ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 px-4 w-full flex-1 bg-[#1ecb15] hover:bg-[#19b512] text-white font-bold py-2 md:py-3 text-xs md:text-sm h-9 md:h-11 shadow-sm flex items-center justify-center"
                type="submit" form="booking-form">Confirm Request</button><button
                class="inline-flex items-center justify-center rounded-md ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none px-4 w-full flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2 md:py-3 text-xs md:text-sm h-9 md:h-11 shadow-sm disabled:opacity-50"
                type="button">WhatsApp</button></div>
    </div>
</div>
